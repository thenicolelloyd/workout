<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Workout Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: #2a2a2a; --border2: #333; --text: #f0ebe4;
    --text2: #888; --text3: #555; --accent: #c8a97e;
    --danger: #e05252; --warn: #e09332;
    --radius: 12px; --radius-sm: 8px;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  #app { max-width: 600px; margin: 0 auto; padding: 1rem 1rem 6rem; min-height: 100vh; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-top: env(safe-area-inset-top, 0px); }
  .header h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text2); }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--text2); padding: 8px; border-radius: var(--radius-sm); font-size: 20px; line-height: 1; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  .icon-btn:active { background: var(--surface2); }
  .setup { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; gap: 1.25rem; padding: 1rem; }
  .setup h2 { font-size: 22px; font-weight: 600; }
  .setup p { color: var(--text2); font-size: 14px; max-width: 340px; line-height: 1.6; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; }
  .modal { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius) var(--radius) 0 0; padding: 1.5rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom, 0px)); width: 100%; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; }
  .tab-btn { flex: 1; padding: 12px 8px; background: none; border: none; font-size: 14px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; min-height: 44px; }
  .tab-btn.active { color: var(--text); font-weight: 600; border-bottom-color: var(--text); }
  .field { margin-bottom: 1.5rem; }
  .field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); margin-bottom: 10px; display: block; }
  .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { padding: 8px 15px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--surface); font-size: 13px; cursor: pointer; color: var(--text2); transition: all 0.15s; white-space: nowrap; min-height: 36px; display: flex; align-items: center; }
  .pill.active { background: var(--surface2); border-color: #666; color: var(--text); font-weight: 500; }
  .pill:active { opacity: 0.7; }
  .seg { display: flex; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
  .seg-btn { flex: 1; padding: 10px 4px; background: transparent; border: none; font-size: 13px; cursor: pointer; color: var(--text2); transition: all 0.15s; min-height: 44px; }
  .seg-btn.active { background: var(--surface2); color: var(--text); font-weight: 500; }
  .style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .style-card { border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px; cursor: pointer; transition: all 0.15s; background: var(--surface); min-height: 64px; }
  .style-card.active { border-color: #666; background: var(--surface2); }
  .style-card:active { opacity: 0.8; }
  .style-card-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .style-card-desc { font-size: 11px; color: var(--text2); line-height: 1.4; }
  input[type="text"], input[type="password"] { width: 100%; padding: 12px 14px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 16px; outline: none; -webkit-appearance: none; }
  input::placeholder { color: var(--text3); }
  .search-input { width: 100%; padding: 10px 12px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 15px; outline: none; margin-bottom: 6px; -webkit-appearance: none; }
  .btn { padding: 12px 20px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface2); color: var(--text); font-size: 15px; font-weight: 500; cursor: pointer; min-height: 44px; }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text2); }
  .gen-btn { width: 100%; padding: 16px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); font-size: 16px; font-weight: 600; cursor: pointer; color: var(--text); transition: all 0.15s; margin-top: 1.5rem; min-height: 54px; }
  .gen-btn:active:not(:disabled) { background: var(--surface2); }
  .gen-btn:disabled { opacity: 0.4; cursor: default; }
  .drop-zone { position: relative; border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 2.5rem 1.5rem; text-align: center; background: var(--surface); cursor: pointer; }
  .drop-zone.drag-over { border-color: #888; background: var(--surface2); }
  .drop-zone input[type="file"] { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
  .drop-zone-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .drop-zone-sub { font-size: 13px; color: var(--text2); }
  .progress-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-top: 12px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); margin-bottom: 10px; }
  .progress-track { height: 5px; background: var(--border2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.15s; }
  .storage-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-top: 10px; }
  .storage-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 5px; }
  .storage-fill { height: 100%; background: var(--text3); border-radius: 2px; }
  .storage-fill.warn { background: var(--warn); }
  .storage-fill.full { background: var(--danger); }
  .cat-filter { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
  .cat-tag { padding: 6px 12px; border-radius: 14px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--border); background: var(--surface); color: var(--text2); min-height: 32px; display: flex; align-items: center; }
  .cat-tag.active { background: var(--surface2); color: var(--text); border-color: #555; }
  .lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-top: 12px; }
  .lib-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; position: relative; }
  .lib-card-img { width: 100%; height: 300px; object-fit: cover; display: block; cursor: pointer; }
  .lib-card-body { padding: 8px 10px; }
  .lib-card-input { width: 100%; background: transparent; border: none; border-bottom: 0.5px solid var(--border); font-size: 12px; color: var(--text); padding: 4px 0; outline: none; }
  .lib-card-del { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.65); border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .lib-cat-badge { position: absolute; top: 8px; left: 8px; padding: 3px 8px; border-radius: 8px; background: rgba(0,0,0,0.65); font-size: 10px; color: #fff; font-weight: 600; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1.5rem 0; }
  .workout-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin: 1.25rem 0 10px; }
  .warmup-item { font-size: 14px; color: var(--text2); padding: 4px 0; }
  .group-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; opacity: 0; transform: translateY(8px); transition: opacity 0.3s, transform 0.3s; }
  .group-card.visible { opacity: 1; transform: translateY(0); }
  .group-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--surface2); border-bottom: 0.5px solid var(--border); }
  .group-header-title { font-size: 14px; font-weight: 600; }
  .group-header-meta { font-size: 13px; color: var(--text2); }
  .ex-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border-bottom: 0.5px solid var(--border); }
  .ex-row:last-of-type { border-bottom: none; }
  .ex-badge { min-width: 26px; height: 26px; border-radius: 50%; border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text2); flex-shrink: 0; margin-top: 1px; }
  .ex-body { flex: 1; min-width: 0; }
  .ex-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .ex-chips { display: flex; flex-wrap: wrap; gap: 10px; font-size: 13px; color: var(--text2); }
  .ex-cue { font-size: 13px; color: var(--text2); font-style: italic; margin-top: 6px; border-left: 2px solid var(--border2); padding-left: 10px; line-height: 1.5; }
  .ex-thumb { width: 72px; height: 72px; border-radius: var(--radius-sm); object-fit: cover; border: 0.5px solid var(--border); flex-shrink: 0; cursor: pointer; }
  .rest-footer { padding: 10px 14px; font-size: 13px; color: var(--text3); }
  .set-table { display: flex; border-radius: var(--radius-sm); overflow: hidden; border: 0.5px solid var(--border); margin-top: 12px; }
  .set-cell { flex: 1; text-align: center; padding: 9px 4px; background: var(--surface2); border-right: 0.5px solid var(--border); }
  .set-cell:last-child { border-right: none; }
  .set-cell-label { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
  .set-cell-reps { font-size: 14px; font-weight: 600; }
  .set-cell-wt { font-size: 10px; color: var(--text3); margin-top: 3px; }
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: pointer; }
  .lightbox img { max-width: 95vw; max-height: 90vh; border-radius: var(--radius); object-fit: contain; }
  .notice { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; color: var(--text2); margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .notice-dismiss { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; min-width: 28px; min-height: 28px; display: flex; align-items: center; justify-content: center; }
  .error-box { background: rgba(224,82,82,0.08); border: 0.5px solid rgba(224,82,82,0.3); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; color: var(--danger); margin-top: 1rem; }
  .hint { font-size: 12px; color: var(--text3); margin-top: 6px; line-height: 1.5; }
  .groups-list { display: flex; flex-direction: column; gap: 12px; }
  .eq-count { font-size: 12px; color: var(--text3); margin-top: 6px; }
</style>
</head>

<script>
