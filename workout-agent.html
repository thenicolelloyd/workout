<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#161618;--s1:#252527;--s2:#2e2e30;--b1:#333335;--b2:#3e3e40;--t1:#f5f5f5;--t2:#999;--t3:#666;--acc:#aec153;--acc-dk:#1a2008;--red:#e05252;--radius:14px;--rsm:10px}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{max-width:600px;margin:0 auto;padding:1rem 1.25rem 6rem;min-height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-top:env(safe-area-inset-top,0px)}
.hdr-left{display:flex;align-items:center;gap:8px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--t3);padding:8px;border-radius:var(--rsm);font-size:20px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.back-btn{background:none;border:none;cursor:pointer;color:var(--t1);font-size:15px;font-weight:600;padding:8px 0;min-height:44px;display:flex;align-items:center;gap:6px}
.page-title{font-size:clamp(36px,10vw,48px);font-weight:900;line-height:1.0;text-transform:uppercase;letter-spacing:-0.02em;margin-bottom:1.25rem;color:var(--t1);white-space:pre-line}
.setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;gap:1.25rem;padding:1rem}
.setup h2{font-size:32px;font-weight:900;text-transform:uppercase;letter-spacing:-0.02em}
.setup p{color:var(--t2);font-size:14px;max-width:340px;line-height:1.6}
.tabs{display:flex;border-bottom:.5px solid var(--b1);margin-bottom:1.25rem}
.tab{flex:1;padding:8px 8px;background:none;border:none;font-size:14px;font-weight:500;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--t1);font-weight:700;border-bottom-color:var(--acc)}
.field{margin-bottom:1.75rem}
.flbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:12px;display:block}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{padding:10px 16px;border-radius:30px;border:.5px solid var(--b2);background:var(--s1);font-size:14px;font-weight:500;cursor:pointer;color:var(--t2);white-space:nowrap;min-height:40px;display:flex;align-items:center}
.pill.on{background:var(--acc);border-color:var(--acc);color:var(--acc-dk);font-weight:700}
.seg{display:flex;background:var(--s1);border-radius:var(--rsm);padding:4px;gap:4px}
.seg-btn{flex:1;padding:9px 4px;background:transparent;border:none;border-radius:var(--rsm);font-size:13px;font-weight:500;cursor:pointer;color:var(--t2);min-height:42px}
.seg-btn.on{background:var(--acc);color:var(--acc-dk);font-weight:700}
.style-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scard{border:.5px solid var(--b1);border-radius:var(--radius);padding:14px;cursor:pointer;background:var(--s1);min-height:80px;position:relative}
.scard.on{border:1.5px solid var(--acc);padding:13px}
.scard-dot{position:absolute;top:14px;right:14px;width:8px;height:8px;border-radius:50%;background:var(--acc);opacity:0}
.scard.on .scard-dot{opacity:1}
.scard-title{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--t1)}
.scard-desc{font-size:12px;color:var(--t2);line-height:1.4}
input[type=text],input[type=password]{width:100%;padding:13px 14px;background:var(--s1);border:.5px solid var(--b2);border-radius:var(--rsm);color:var(--t1);font-size:16px;outline:none;-webkit-appearance:none}
input::placeholder{color:var(--t3)}
.search-inp{width:100%;padding:11px 14px;background:var(--s1);border:.5px solid var(--b1);border-radius:var(--rsm);color:var(--t1);font-size:15px;outline:none;-webkit-appearance:none}
.btn{padding:13px 20px;border-radius:var(--rsm);border:.5px solid var(--b2);background:var(--s2);color:var(--t1);font-size:15px;font-weight:600;cursor:pointer;min-height:46px}
.btn-pri{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--t2)}
.gen-btn{width:100%;padding:18px;border-radius:var(--radius);border:none;background:var(--acc);font-size:15px;font-weight:800;cursor:pointer;color:var(--acc-dk);min-height:58px;text-transform:uppercase;letter-spacing:.05em}
.gen-btn:disabled{opacity:.4;cursor:default}
.gen-btn-wrap{position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(to top,var(--bg) 70%,transparent);padding:1rem 1.25rem calc(1rem + env(safe-area-inset-bottom,0px));max-width:600px;margin:0 auto}
.ex-tab-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.ex-tab-hdr h2{font-size:22px;font-weight:800}
.ex-list-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:.5px solid var(--b1)}
.ex-list-item:last-child{border-bottom:none}
.ex-list-thumb{width:96px;height:96px;border-radius:var(--rsm);overflow:hidden;flex-shrink:0;background:var(--s2);cursor:pointer}

.ex-list-thumb-ph{width:96px;height:96px;border-radius:var(--rsm);background:var(--s2);flex-shrink:0}

.session-eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:8px}
.wo-title{font-size:clamp(28px,8vw,38px);font-weight:900;line-height:1.0;text-transform:uppercase;letter-spacing:-0.02em;margin-bottom:14px}
.wo-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem}

.sec-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:1.25rem 0 10px}
.wu-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:.5px solid var(--b1);font-size:15px}
.wu-item:last-child{border-bottom:none}
.wu-dur{color:var(--t2);font-size:13px;font-weight:500}
.group-card{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--radius);overflow:hidden;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;margin-bottom:12px}

.g-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--s2)}
.g-hdr-title{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.g-hdr-meta{font-size:13px;color:var(--t2);font-weight:500}
.ex-row{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-top:.5px solid var(--b1);position:relative}
.ex-thumb-wrap{width:96px;height:96px;border-radius:var(--rsm);overflow:hidden;flex-shrink:0;background:var(--s2)}

.ex-body{flex:1;min-width:0;padding-right:32px}
.ex-name{font-size:15px;font-weight:700;margin-bottom:3px}

.ex-cue{font-size:13px;color:var(--t2);line-height:1.5;margin-top:4px}

.rest-footer{padding:12px 16px;font-size:13px;color:var(--t3)}
.set-table{display:flex;overflow:hidden;border-radius:var(--rsm);border:.5px solid var(--b1);margin-top:12px}
.set-cell{flex:1;text-align:center;padding:10px 4px;background:var(--s2);border-right:.5px solid var(--b1)}

.set-cell-rep{font-size:14px;font-weight:700;color:var(--acc)}
.set-cell-wt{font-size:10px;color:var(--t3);margin-top:3px}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:pointer}

.swap-hdr{padding:16px 20px;border-bottom:.5px solid var(--b1);flex-shrink:0}
.swap-hdr h3{font-size:16px;font-weight:800;text-transform:uppercase}
.swap-hdr p{font-size:13px;color:var(--t2);margin-top:2px}
.swap-list{overflow-y:auto;flex:1}
.swap-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:.5px solid var(--b1);cursor:pointer}
.swap-item:active{background:var(--s2)}
.swap-thumb{width:56px;height:56px;border-radius:var(--rsm);object-fit:cover;background:var(--s2);flex-shrink:0;display:block}
.swap-thumb-ph{width:56px;height:56px;border-radius:var(--rsm);background:var(--s2);flex-shrink:0}
.swap-name{font-size:14px;font-weight:600}
.swap-cat{font-size:12px;color:var(--t2);margin-top:2px}
.swap-cancel{padding:16px;font-size:15px;font-weight:600;cursor:pointer;border:none;background:var(--s2);color:var(--acc);width:100%;text-align:center;flex-shrink:0}
.notice{background:var(--s1);border:.5px solid var(--b2);border-radius:var(--rsm);padding:13px 14px;font-size:14px;color:var(--t2);margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;gap:12px}
.err{background:rgba(224,82,82,.08);border:.5px solid rgba(224,82,82,.3);border-radius:var(--rsm);padding:13px 14px;font-size:14px;color:var(--red);margin-top:1rem}
.hint{font-size:12px;color:var(--t3);margin-top:6px;line-height:1.5}
.eq-count{font-size:12px;color:var(--t3);margin-top:7px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;z-index:1000}
.modal{background:var(--s1);border:.5px solid var(--b2);border-radius:var(--radius) var(--radius) 0 0;padding:1.5rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom,0px));width:100%}
.modal h3{font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:1.25rem}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:14px}
.loading-state{text-align:center;padding:3rem 1rem;color:var(--t2);font-size:14px}
.save-btn{display:block;width:100%;margin-top:2rem;padding:16px;border-radius:var(--radius);border:.5px solid var(--b2);background:var(--s1);color:var(--t1);font-size:15px;font-weight:600;cursor:pointer;text-align:center}
.save-btn.saved{color:var(--acc);border-color:var(--acc);background:rgba(174,193,83,.08);cursor:default}
.saved-card{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--radius);padding:16px;margin-bottom:12px;position:relative;transition:border-color .15s}
.saved-card-tap{cursor:pointer}
.saved-card-tap:active{border-color:var(--b2)}
.saved-card-name{font-size:16px;font-weight:700;margin-bottom:8px;padding-right:36px}
.saved-card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.saved-card-tag{padding:3px 10px;border-radius:20px;border:.5px solid var(--b1);font-size:11px;font-weight:500;color:var(--t2)}
.saved-card-date{font-size:11px;color:var(--t3);margin-bottom:10px}
.saved-card-notes{width:100%;background:var(--s2);border:.5px solid var(--b1);border-radius:var(--rsm);color:var(--t1);font-size:13px;padding:10px 12px;outline:none;resize:none;font-family:inherit;line-height:1.5;min-height:38px;margin-top:4px}

.saved-card-notes:focus{border-color:var(--b2)}

.saved-card-del:active{opacity:1}
.saved-card-del.pending{opacity:1;font-weight:700;}
.delete-btn{width:100%;padding:14px;border-radius:var(--rsm);border:.5px solid rgba(224,82,82,.3);background:rgba(224,82,82,.06);color:var(--red);font-size:14px;font-weight:600;cursor:pointer;margin-top:1.5rem;text-align:center}
.delete-btn.pending{background:rgba(224,82,82,.15);border-color:rgba(224,82,82,.5);}
@keyframes btnPulse{0%,100%{opacity:1}50%{opacity:.6}}
.gen-btn.pulsing{animation:btnPulse 3s ease-in-out infinite}

.group-card.flash{animation:groupFlash 1.6s ease-out forwards}
</style>

<script>
const SUPABASE_URL='https://aohiqwpuikueisshddos.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvaGlxd3B1aWt1ZWlzc2hkZG9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA3NzkxMDIsImV4cCI6MjA2NjM1NTEwMn0.YkLNMHyIi9QLNEbIYEDrPJiGNj0oOLBHgFJGqYlHwdY';
const LS_SAVED='wo_saved_v1';
const EXERCISES_URL='https://raw.githubusercontent.com/thenicolelloyd/workout/main/exercises.json';
const IMAGES_BASE='https://raw.githubusercontent.com/thenicolelloyd/workout/main/exercise-images/';

// Supabase client
const _supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Supabase helpers ──────────────────────────────────────────────────────────

async function fetchRecentHistory(focus) {
  try {
    const { data, error } = await _supa
      .from('workout_history')
      .select('exercises, created_at')
      .eq('focus', focus)
      .order('created_at', { ascending: false })
      .limit(3);
    if (error) return [];
    return data || [];
  } catch(e) { return []; }
}

async function saveWorkoutHistory(workoutId) {
  try {
    const focus = S.muscles.includes('full_body') ? 'full_body' : S.muscles.join('_');
    const allExercises = (S.workout.groups || []).flatMap(g =>
      g.exercises ? g.exercises.map(e => e.name) : [g.group_label]
    );
    await _supa.from('workout_history').insert({
      id: workoutId,
      focus: focus,
      style: S.style,
      duration: S.time,
      equipment: S.eq,
      exercises: allExercises,
      workout_name: S.workout.workout_name
    });
  } catch(e) { console.warn('History save failed:', e); }
}

async function logSwap(originalExercise, swappedFor) {
  try {
    const workoutId = S.currentWorkoutId;
    if (!workoutId) return;
    await _supa.from('exercise_swaps').insert({
      workout_id: workoutId,
      original_exercise: originalExercise,
      swapped_for: swappedFor
    });
  } catch(e) { console.warn('Swap log failed:', e); }
}

const EQ_GROUPS=[
  {id:'Band',label:'Bands',cats:['Band']},
  {id:'Dumbbell',label:'Dumbbells',cats:['Dumbbell']},
  {id:'Kettlebell',label:'Kettlebells',cats:['Kettlebell']},
  {id:'Barbell',label:'Barbell',cats:['Barbell']},
  {id:'Machine',label:'Machines',cats:['Machine']},
];
const MUSCLES=[{id:'full_body',label:'Full Body'},{id:'back_chest',label:'Back & Chest'},{id:'shoulders',label:'Shoulders'},{id:'arms',label:'Arms'},{id:'core',label:'Core'},{id:'legs',label:'Legs'}];
const TIMES=['20 min','30 min','45 min','60 min'];
const STYLES=[{id:'circuit',title:'Circuit',desc:'3-4 exercises back-to-back, rest between rounds'},{id:'superset',title:'Superset',desc:'Paired exercises back-to-back, rest after each pair'},{id:'progressive',title:'Progressive overload',desc:'Weight climbs each set, reps drop'},{id:'pyramid',title:'Pyramid',desc:'Weight climbs then descends'}];
const GOAL_TEXT={lose_fat:'GOAL — Fat loss: reps 10-15, short rest (30-45s), maximize heart rate and calorie burn.',recomp:'GOAL — Fat loss + muscle: reps 8-12, moderate rest (45-60s), balance conditioning with hypertrophy.',gain_muscle:'GOAL — Muscle gain: reps 6-8, rest 60-90s, prioritize strength and progressive overload.'};
const GOAL_LABELS={lose_fat:'Lose fat',recomp:'Lose fat + build',gain_muscle:'Build muscle'};
const GOAL_REPS={lose_fat:{lo:10,hi:15},recomp:{lo:8,hi:12},gain_muscle:{lo:6,hi:8}};
const SCHEMAS={
  circuit:`Each group: {"type":"circuit","group_label":"Circuit 1","sets_or_rounds":3,"rest_between_exercises":"none","rest_after_group":"60s","exercises":[{"name":"Exercise Name","reps":"12","cue":"coaching tip"}]}. MAX 4 exercises per circuit. 2 circuits if time allows.`,
  superset:`Each group: {"type":"superset","group_label":"Superset A","sets_or_rounds":3,"rest_between_exercises":"10s","rest_after_group":"45s","exercises":[{"name":"Ex One","reps":"12","cue":"tip"},{"name":"Ex Two","reps":"12","cue":"tip"}]}. EXACTLY 2 exercises per superset (it's a pair). 3 rounds per superset. Follow the superset count for the workout duration.`,
  progressive:`Each group: {"type":"progressive","group_label":"Exercise Name","rest_between_sets":"60s","sets":[{"set_num":1,"reps":"12","weight":"light"},{"set_num":2,"reps":"10","weight":"moderate"},{"set_num":3,"reps":"8","weight":"heavy"},{"set_num":4,"reps":"6","weight":"heaviest"}],"cue":"tip"}. 4-6 exercises.`,
  pyramid:`Each group: {"type":"pyramid","group_label":"Exercise Name","rest_between_sets":"45s","sets":[{"set_num":1,"reps":"15","weight":"light"},{"set_num":2,"reps":"12","weight":"moderate"},{"set_num":3,"reps":"10","weight":"heavy"},{"set_num":4,"reps":"12","weight":"moderate"},{"set_num":5,"reps":"15","weight":"light"}],"cue":"tip"}. 3-5 exercises.`
};

let S={
  screen:'setup',tab:'workout',workoutView:false,workoutSource:'generate',
  goal:'gain_muscle',muscles:['full_body'],time:'30 min',style:'circuit',eq:['Band','Dumbbell'],
  loading:false,workout:null,error:null,
  exercises:[],exLoading:true,exError:null,
  exSearch:'',exCat:null,
  saved:[],pendingDeleteId:null,
  lightbox:null,goalSheet:false,
  kabob:null,swapModal:null,flashTarget:null,woAnimated:false,currentWorkoutId:null

    S.exercises=await res.json();

function getFiltered(){
  const allowed=EQ_GROUPS.filter(g=>S.eq.includes(g.id)).flatMap(g=>g.cats);
  allowed.push('Body Weight');
  return S.exercises.filter(ex=>allowed.includes(ex.equipment));
}

function findExercise(name){
  const norm=s=>s.toLowerCase().replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();
  const n=norm(name);
  return S.exercises.find(ex=>norm(ex.name)===n)||S.exercises.find(ex=>{const en=norm(ex.name);return n.includes(en)||en.includes(n);});
}

function findImg(name){
  const ex=findExercise(name);
  return ex?IMAGES_BASE+encodeURIComponent(ex.file):null;
}

function getSwapCandidates(exerciseName){
  const ex=findExercise(exerciseName);
  const norm=s=>s.toLowerCase().replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();
  const n=norm(exerciseName);
  const allowed=getFiltered().map(e=>norm(e.name));

  // Tier 1: same substitution_group (closest swap)
  let t1=[];
  if(ex?.substitution_group){
    t1=S.exercises.filter(e=>
      norm(e.name)!==n &&
      allowed.includes(norm(e.name)) &&
      e.substitution_group===ex.substitution_group
    );
  }

  // Tier 2: same movement_pattern, different equipment
  let t2=[];
  if(ex?.movement_pattern){
    t2=S.exercises.filter(e=>
      norm(e.name)!==n &&
      allowed.includes(norm(e.name)) &&
      e.movement_pattern===ex.movement_pattern &&
      !t1.find(t=>norm(t.name)===norm(e.name))
    );
  }

  // Tier 3: same primary muscle, different pattern (last resort)
  let t3=S.exercises.filter(e=>
    norm(e.name)!==n &&
    allowed.includes(norm(e.name)) &&
    e.muscles[0]===ex?.muscles[0] &&
    !t1.find(t=>norm(t.name)===norm(e.name)) &&
    !t2.find(t=>norm(t.name)===norm(e.name))
  );

  // Tag each candidate with its tier for UI labeling
  const tag=(arr,tier,note)=>arr.map(e=>({...e,_tier:tier,_note:note}));
  return [
    ...tag(t1,1,'Similar exercise'),
    ...tag(t2,2,'Same pattern'),
    ...tag(t3,3,'Same muscle group')
  ];
}

function el(tag,props={},...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==='className')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(v!==false&&v!=null)e.setAttribute(k,v);
  }
  for(const c of kids){if(c==null||c===false)continue;e.appendChild(typeof c==='string'?document.createTextNode(c):c);}
  return e;
}

function doRemove(gIdx,eIdx,type){S.kabob=null;if(type==='exercise'){S.workout.groups[gIdx].exercises.splice(eIdx,1);if(!S.workout.groups[gIdx].exercises.length)S.workout.groups.splice(gIdx,1);}else{S.workout.groups.splice(gIdx,1);}persistSavedEdits();render();}
function doMove(gIdx,eIdx,type,dir){
  S.kabob=null;
  if(type==='exercise'){
    const exs=S.workout.groups[gIdx].exercises;
    const ni=eIdx+dir;if(ni<0||ni>=exs.length)return render();
    [exs[ni],exs[eIdx]]=[exs[eIdx],exs[ni]];
    S.flashTarget={gIdx,eIdx:ni,type:'exercise'};
  }else{
    const gs=S.workout.groups;
    const ni=gIdx+dir;if(ni<0||ni>=gs.length)return render();
    [gs[ni],gs[gIdx]]=[gs[gIdx],gs[ni]];
    S.flashTarget={gIdx:ni,type:'group'};
  }
  render();
  setTimeout(()=>{S.flashTarget=null;persistSavedEdits();},1700);

function applySwap(newName){
  const{gIdx,eIdx,type,name:origName}=S.swapModal;
  S.swapModal=null;
  if(type==='exercise'){
    const ex=S.workout.groups[gIdx].exercises[eIdx];
    S.workout.groups[gIdx].exercises[eIdx]={...ex,name:newName};
    logSwap(origName, newName);
  }else{
    S.workout.groups[gIdx].group_label=newName;
  }
  persistSavedEdits();render();
}

function applyGoal(goalId){
  S.goal=goalId;
  S.goalSheet=false;
  const{lo,hi}=GOAL_REPS[goalId];
  // Update reps on all exercises in the workout
  (S.workout.groups||[]).forEach(g=>{
    if(g.exercises){
      g.exercises.forEach(ex=>{
        // Only update if reps looks like a number (not "30s" or "AMRAP")
        if(/^\d/.test(ex.reps||'')){
          ex.reps=`${lo}-${hi}`;
        }
      });
    }else if(g.sets){
      // Progressive/pyramid: update each set's reps proportionally
      const totalSets=g.sets.length;
      g.sets.forEach((s,i)=>{
        if(/^\d/.test(s.reps||'')){
          // Spread reps across the range across sets
          const frac=totalSets>1?i/(totalSets-1):0.5;
          const rep=Math.round(hi-(frac*(hi-lo)));
          s.reps=String(rep);
        }
      });
    }
  });
  persistSavedEdits();
  render();
}

async function doGenerate(){
  S.loading=true;S.workout=null;S.error=null;render();
  const filtered=getFiltered();

  const focusKey=S.muscles.includes('full_body')?'full_body':S.muscles.join('_');
  const recentHistory=await fetchRecentHistory(focusKey);

  // Recency scoring: last session = -10, 2 ago = -5, 3 ago = -2
  const recencyScores={};
  const penalties=[-10,-5,-2];
  recentHistory.forEach((h,i)=>{
    (h.exercises||[]).forEach(name=>{
      recencyScores[name]=(recencyScores[name]||0)+penalties[i];
    });
  });
  const allRecent=Object.keys(recencyScores);
  const strongAvoid=allRecent.filter(n=>recencyScores[n]<=-10);
  const softAvoid=allRecent.filter(n=>recencyScores[n]>-10&&recencyScores[n]<=-5);
  const allUsed=new Set(allRecent);
  const freshExercises=filtered.filter(e=>!allUsed.has(e.name)).map(e=>e.name);

  let recentHint='';
  if(strongAvoid.length>0)recentHint+=`\n\nDO NOT USE (used last session): ${strongAvoid.join(', ')}`;
  if(softAvoid.length>0)recentHint+=`\nPREFER TO AVOID (used recently): ${softAvoid.join(', ')}`;
  if(freshExercises.length>0)recentHint+=`\nPREFER THESE (not used recently): ${freshExercises.join(', ')}`;

  // Circuit timing rules
  const circuitRules={'20 min':'1 circuit, 4 exercises, 3 rounds','30 min':'2 circuits, 3 exercises each, 3 rounds each','45 min':'2 circuits, 4 exercises each, 3 rounds each','60 min':'3 circuits, 4 exercises each, 3 rounds each'};
  const circuitNote=S.style==='circuit'?`\nCIRCUIT STRUCTURE: ${circuitRules[S.time]||'2 circuits, 3-4 exercises, 3 rounds'}. Follow this exactly.`:'';

  // Superset timing rules
  const supersetRules={'20 min':'2 supersets, 3 rounds each, 2 exercises each','30 min':'3 supersets, 3 rounds each, 2 exercises each','45 min':'4 supersets, 3 rounds each, 2 exercises each','60 min':'5 supersets, 3 rounds each, 2 exercises each'};
  const supersetNote=S.style==='superset'?`\nSUPERSET STRUCTURE: ${supersetRules[S.time]||'3 supersets, 3 rounds, 2 exercises each'}. Each superset is a PAIR — EXACTLY 2 exercises. 3 rounds per superset. Follow this exactly.`:'';

  // Legs focus includes calves
  const legsNote=S.muscles.includes('legs')?' Legs includes calves — include at least one calf exercise (e.g. Calf Raise, Lateral Step Up) as a finisher slot.':'';

  // Annotate library with movement patterns for smarter ordering
  const exList=filtered.length>0
    ?`EXERCISE LIBRARY — use ONLY these exact names:\n${filtered.map(e=>{
        const meta=e.movement_pattern?` [${e.movement_pattern},pri:${e.order_priority},${e.role_hint}]`:'';
        return e.name+meta;
      }).join(', ')}`
    :'No library loaded. Use expert knowledge.';

  const ml=S.muscles.includes('full_body')?'Full Body':S.muscles.map(id=>MUSCLES.find(m=>m.id===id)?.label||id).join(', ');
  const eqList=EQ_GROUPS.filter(g=>S.eq.includes(g.id)).map(g=>g.label).join(', ')||'Body Weight only';
  try{
    const res=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-haiku-4-5',max_tokens:2000,
        system:'Expert strength coach. Return ONLY a single valid JSON object. No markdown, no backticks. Start with { end with }. Exercise ordering rules: order_priority 1 (power_compound) goes first, priority 2 (primary compounds) second, priority 3 (accessory) third, priority 4 (isolation/finisher) last. Never place two exercises with the same movement_pattern back-to-back. Body weight exercises (role_hint: accessory or finisher) go in slots 3-4 of circuits, not slot 1.',
        messages:[{role:'user',content:`Generate a ${S.time} strength workout.\\nFocus: ${ml}${legsNote}\\nEquipment: ${eqList}\\nStyle: ${S.style}\\n${GOAL_TEXT[S.goal]}\\n\\n${exList}${recentHint}${circuitNote}${supersetNote}\\n\\nRULES: Use EXACT exercise names from the library. Body Weight always allowed. Follow order_priority for exercise sequencing within groups.\\n\\n${SCHEMAS[S.style]}\\n\\nReturn: {"workout_name":"string","warmup":[{"name":"string","duration":"string"}],"groups":[],"cooldown":[{"name":"string","duration":"string"}]}`}]
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const raw=data.content?.find(b=>b.type==='text')?.text||'';
    // Robust extraction: strip markdown fences, then extract from first { to last }
    const stripped=raw.replace(/^```[\w]*\n?/,'').replace(/\n?```$/,'').trim();
    const firstBrace=stripped.indexOf('{');
    const lastBrace=stripped.lastIndexOf('}');
    if(firstBrace===-1||lastBrace===-1)throw new Error('No JSON found in response.');
    const clean=stripped.slice(firstBrace,lastBrace+1);
    const parsed=JSON.parse(clean);
    if(!parsed.groups||!Array.isArray(parsed.groups))throw new Error('Invalid structure.');
    const newWorkoutId=crypto.randomUUID();
    S.currentWorkoutId=newWorkoutId;
    S.workout=parsed;S.loading=false;S.workoutView=true;S.woAnimated=false;S.workoutSource='generate';S.viewingSavedId=null;render();
    window.scrollTo(0,0);
    saveWorkoutHistory(newWorkoutId);
    setTimeout(()=>{document.querySelectorAll('.group-card').forEach((c,i)=>setTimeout(()=>c.classList.add('show'),i*120));S.woAnimated=true;},50);
  }catch(e){S.error=`Could not generate: ${e.message}`;S.loading=false;render();}
}

    w.appendChild(el('p',{className:'sec-lbl',style:{marginTop:'1rem'}},'Cool-down'));
    const cd=el('div',{style:{borderTop:'.5px solid var(--b1)'}});
    wo.cooldown.forEach(x=>{const row=el('div',{className:'wu-item'});row.appendChild(el('span',{},x.name));row.appendChild(el('span',{className:'wu-dur'},x.duration));cd.appendChild(row);});
    w.appendChild(cd);
  }
  // Save button — only show when viewing a freshly generated workout
  if(S.workoutSource==='generate'){
    const already=isSaved();
    const saveBtn=el('button',{className:'save-btn'+(already?' saved':''),onClick:()=>{if(!already){saveCurrent();render();}}},already?'✓ Saved':'+ Save workout');
    w.appendChild(saveBtn);
  }
  // Delete button — when viewing a saved workout
  if(S.workoutSource==='saved'&&S.viewingSavedId){
    const isPending=S.pendingDeleteId===S.viewingSavedId;
    w.appendChild(el('button',{className:'delete-btn'+(isPending?' pending':''),onClick:()=>confirmDeleteSaved(S.viewingSavedId)},isPending?'Tap again to confirm delete':'Delete workout'));
  }
  return w;
}

function renderGroup(g,gIdx){
  const isGroupFlash=S.flashTarget&&S.flashTarget.type==='group'&&S.flashTarget.gIdx===gIdx;
  const card=el('div',{className:'group-card'+(isGroupFlash?' flash':'')});
  const hdr=el('div',{className:'g-hdr'});
  hdr.appendChild(el('span',{className:'g-hdr-title'},g.group_label));
  const isC=g.type==='circuit',isS=g.type==='superset';
  if(isC||isS){
    hdr.appendChild(el('span',{className:'g-hdr-meta'},isC?`${g.sets_or_rounds} rounds`:`${g.sets_or_rounds} sets`));
    card.appendChild(hdr);
    (g.exercises||[]).forEach((ex,j)=>{
      const isFlash=S.flashTarget&&S.flashTarget.type==='exercise'&&S.flashTarget.gIdx===gIdx&&S.flashTarget.eIdx===j;
      const row=el('div',{className:'ex-row'+(isFlash?' flash':'')});
      const tw=el('div',{className:'ex-thumb-wrap'});
      const imgUrl=findImg(ex.name);
      if(imgUrl){const i=el('img',{src:imgUrl,alt:ex.name,onClick:()=>{S.lightbox=imgUrl;render();}});i.onerror=()=>tw.style.background='var(--s2)';tw.appendChild(i);}
      row.appendChild(tw);
      const body=el('div',{className:'ex-body'});
      body.appendChild(el('p',{className:'ex-name'},ex.name));
      body.appendChild(el('p',{className:'ex-reps'},ex.reps));
      const exData=findExercise(ex.name);
      if(exData?.muscles?.length)body.appendChild(el('p',{className:'ex-muscles'},exData.muscles.join(' · ')));
      if(ex.cue)body.appendChild(el('p',{className:'ex-cue'},ex.cue));
      row.appendChild(body);
      row.appendChild(el('button',{className:'kabob-btn',onClick:e=>{e.stopPropagation();S.kabob={gIdx,eIdx:j,type:'exercise'};render();}},'⋮'));
      card.appendChild(row);
    });
    card.appendChild(el('div',{className:'rest-footer'},isC?`No rest between exercises · Rest ${g.rest_after_group} between rounds`:`${g.rest_between_exercises} between exercises · Rest ${g.rest_after_group} after superset`));
  }else{
    const kb=el('button',{className:'kabob-btn',style:{position:'relative',top:'0',right:'0'},onClick:e=>{e.stopPropagation();S.kabob={gIdx,eIdx:0,type:'group'};render();}});
    kb.textContent='⋮';
    hdr.appendChild(el('span',{className:'g-hdr-meta'},`Rest ${g.rest_between_sets} between sets`));
    hdr.appendChild(kb);
    card.appendChild(hdr);
    const body=el('div',{style:{padding:'14px 16px'}});
    const imgUrl=findImg(g.group_label);
    if(imgUrl){const i=el('img',{src:imgUrl,alt:g.group_label,style:{width:'100%',maxHeight:'200px',objectFit:'cover',borderRadius:'var(--rsm)',marginBottom:'12px',cursor:'pointer'},onClick:()=>{S.lightbox=imgUrl;render();}});i.onerror=()=>i.style.display='none';body.appendChild(i);}
    const tbl=el('div',{className:'set-table'});
    (g.sets||[]).forEach(s=>{const c=el('div',{className:'set-cell'});c.appendChild(el('div',{className:'set-cell-lbl'},`Set ${s.set_num}`));c.appendChild(el('div',{className:'set-cell-rep'},s.reps));c.appendChild(el('div',{className:'set-cell-wt'},s.weight));tbl.appendChild(c);});
    body.appendChild(tbl);
    if(g.cue)body.appendChild(el('div',{className:'ex-cue',style:{marginTop:'12px'}},g.cue));
    card.appendChild(body);
  }
  return card;
}

function renderExercisesTab(){
  const w=el('div',{});
  const tabHdr=el('div',{className:'ex-tab-hdr'});
  tabHdr.appendChild(el('h2',{},'Exercises'));
  w.appendChild(tabHdr);

  if(S.exLoading){w.appendChild(el('div',{className:'loading-state'},'Loading exercises…'));return w;}
  if(S.exError){w.appendChild(el('div',{className:'err'},S.exError));return w;}
  if(!S.exercises.length){w.appendChild(el('div',{className:'empty-state'},'No exercises found'));return w;}

  const si=el('input',{className:'search-inp',placeholder:'Search exercises…',value:S.exSearch||'',onInput:e=>{S.exSearch=e.target.value;render();}});
  w.appendChild(si);

  const cats=[...new Set(S.exercises.map(e=>e.equipment))].sort();
  const cf=el('div',{className:'cat-filter'});
  cf.appendChild(el('button',{className:'cat-tag'+(!S.exCat?' on':''),onClick:()=>{S.exCat=null;render();}},'All'));
  cats.forEach(c=>{
    const cnt=S.exercises.filter(e=>e.equipment===c).length;
    cf.appendChild(el('button',{className:'cat-tag'+(S.exCat===c?' on':''),onClick:()=>{S.exCat=S.exCat===c?null:c;render();}},`${c} · ${cnt}`));
  });
  w.appendChild(cf);

  const filtered=S.exercises.filter(ex=>{
    const ms=!S.exSearch||ex.name.toLowerCase().includes(S.exSearch.toLowerCase());
    const mc=!S.exCat||ex.equipment===S.exCat;
    return ms&&mc;
  }).sort((a,b)=>a.name.localeCompare(b.name));

  const list=el('div',{style:{marginTop:'8px'}});
  filtered.forEach(ex=>{
    const item=el('div',{className:'ex-list-item'});
    const thumb=el('div',{className:'ex-list-thumb',onClick:()=>{S.lightbox=IMAGES_BASE+encodeURIComponent(ex.file);render();}});
    const img=el('img',{src:IMAGES_BASE+encodeURIComponent(ex.file),alt:ex.name});
    img.onerror=()=>{thumb.className='ex-list-thumb-ph';};
    thumb.appendChild(img);
    item.appendChild(thumb);
    const info=el('div',{className:'ex-list-info'});
    info.appendChild(el('div',{className:'ex-list-name'},ex.name));
    const muscleTxt=ex.muscles.join(' · ');
    const badge=el('span',{className:'ex-cat-badge'},ex.equipment);
    info.appendChild(badge);
    if(muscleTxt)info.appendChild(el('div',{style:{fontSize:'11px',color:'var(--t3)',marginTop:'3px'}},muscleTxt));
    item.appendChild(info);
    list.appendChild(item);
  });
  w.appendChild(list);
  return w;
}

function renderSavedTab(){
  const w=el('div',{});
  w.appendChild(el('h1',{className:'page-title',style:{marginBottom:'1.5rem'}},'Saved'));
  if(!S.saved.length){
    w.appendChild(el('div',{className:'empty-state'},'No saved workouts yet — generate one and tap + Save workout'));
    return w;
  }
  S.saved.forEach(s=>{
    const card=el('div',{className:'saved-card'});
    // Tappable area (name + tags + date)
    const tap=el('div',{className:'saved-card-tap',onClick:()=>{
      S.workout=JSON.parse(JSON.stringify(s.workout));
      S.goal=s.goal;S.time=s.time;S.style=s.style;S.eq=[...s.eq];S.muscles=[...s.muscles];
      S.workoutView=true;S.workoutSource='saved';S.viewingSavedId=s.id;S.woAnimated=false;
      render();
      window.scrollTo(0,0);
      setTimeout(()=>{document.querySelectorAll('.group-card').forEach((c,i)=>setTimeout(()=>c.classList.add('show'),i*120));S.woAnimated=true;},50);
    }});
    tap.appendChild(el('div',{className:'saved-card-name'},s.name));
    const tags=el('div',{className:'saved-card-tags'});
    tags.appendChild(el('span',{className:'saved-card-tag'},GOAL_LABELS[s.goal]||s.goal));
    tags.appendChild(el('span',{className:'saved-card-tag'},s.time));
    tags.appendChild(el('span',{className:'saved-card-tag'},STYLES.find(st=>st.id===s.style)?.title||s.style));
    tap.appendChild(tags);
    tap.appendChild(el('div',{className:'saved-card-date'},'Saved '+s.savedAt));
    card.appendChild(tap);
    // Notes field
    const notes=el('textarea',{className:'saved-card-notes',placeholder:'Add notes…',rows:'2',onClick:e=>e.stopPropagation()});
    notes.value=s.notes||'';
    notes.addEventListener('blur',e=>{updateNotes(s.id,e.target.value);});
    notes.addEventListener('click',e=>e.stopPropagation());
    notes.addEventListener('keydown',e=>e.stopPropagation());
    card.appendChild(notes);
    // Delete button
    const isPending=S.pendingDeleteId===s.id;
    const del=el('button',{className:'saved-card-del'+(isPending?' pending':''),onClick:e=>{e.stopPropagation();confirmDeleteSaved(s.id);}},isPending?'Confirm delete':'Delete');
    card.appendChild(del);
    w.appendChild(card);
  });
  return w;
}

render();
</script>
</body>
